<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Path for text alignment, optimized for this design structure -->
    <path id="textPathTop" d="M 120, 256 A 136,136 0 1,1 392,256" fill="none"/>
  </defs>

  <!-- Base Circle Structure: Uniform Slate Blue -->
  <circle cx="256" cy="256" r="230" fill="#3A4E65"/>
  
  <!-- Outer Ring Detail: Slate Blue -->
  <circle cx="256" cy="256" r="222" fill="none" stroke="#3A4E65" stroke-width="16"/>

  <!-- Wrapped Text in Light Slate Gray: FRAMEWORKS ACADEMY -->
  <text font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#BDC3C7" letter-spacing="6">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">
      FRAMEWORKS ACADEMY
    </textPath>
  </text>

  <!-- Inner Light Slate Gray Accent Ring -->
  <circle cx="256" cy="256" r="184" fill="none" stroke="#BDC3C7" stroke-width="6"/>

  <!-- Central Emblem: Lightbulb & Keyhole in Golden Orange -->
  <g transform="translate(186, 170) scale(0.32)">
    <!-- Bulb Outline, Keyhole Shape, and Base Details in Golden Orange -->
    <path d="M256 32C150 32 64 118 64 224c0 65 32 122 82 157v59c0 18 14 32 32 32h156c18 0 32-14 32-32v-59c50-35 82-92 82-157C448 118 362 32 256 32z" fill="#F9A825"/>
    
    <!-- Base Screw Details and Internal Shape in Golden Orange -->
    <path d="M176 496h160v16H176z" fill="#F9A825"/>
    <path d="M208 528h96v16h-96z" fill="#F9A825"/>
    
    <!-- Keyhole Shape - Cutout in Slate Blue (same as background) -->
    <circle cx="256" cy="216" r="38" fill="#3A4E65"/>
    <path d="M232 240 L280 240 L292 330 L220 330 Z" fill="#3A4E65"/>
  </g>
</svg>
